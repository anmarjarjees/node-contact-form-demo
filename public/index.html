<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- Ensures proper responsive behavior on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description"
        content="Contact form demo source code. Project built with Node.js and Express demonstrating backend form handling, validation, and email integration.">

    <meta name="keywords" content="Node.js, Express, contact form, backend demo, web development, email integration">

    <meta name="author" content="Anmar Jarjees">

    <!-- 
    Open Graph metadata:
    ********************
    Open Graph (OG) = metadata standard created by Facebook

    Used to control how the page appears when shared on social media platforms
    such as LinkedIn, Facebook, and messaging apps.

    It defines the title, description, image, and type of preview shown.
    Link: https://ogp.me/
    -->
    <meta property="og:title" content="Secure Contact Form Demo | Node.js Express">

    <!-- Short description used in social media link previews -->
    <meta property="og:description"
        content="A Node.js and Express secure contact form demonstration project with validation, rate limiting, and email integration.">

    <meta property="og:type" content="website">

    <!-- 
    Open Graph image:
    *****************
    Must use a relative path for GitHub/demo portability.
    Avoid absolute production URLs in demo repositories.
    -->
    <meta property="og:image" content="assets/logo.png">

    <title>Secure Contact Form Demo | Node.js Express</title>

    <link rel="icon" href="favicon.ico">

    <!-- Icon used when website is saved to iOS home screen -->
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

    <!-- 
    Performance optimization:
    Improves loading performance for external CDN resources by establishing early connection.
    Link: https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Attributes/rel/preconnect
    -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>

    <!-- 
    reCAPTCHA script is commented out because it is not required in this demo version part1.
    Only enable it when backend verification is implemented.
    -->
    <!-- <script src="https://www.google.com/recaptcha/api.js" async defer></script> -->

    <link rel="stylesheet" href="css/style.css">

    <!--
    Performance optimization:
    ***********************
    Preconnect reduces DNS + TLS handshake time for external CDN resources.
    This improves initial page load performance slightly.
    -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>

    <!--
    Icon library (Font Awesome):
    *****************************
    Keep only if icons are actively used in UI components.
    Otherwise it can be removed to reduce external dependencies.
    -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


</head>

<body>

    <header>
        <h1>Demo Contact Form</h1>
    </header>

    <!-- Just an image -->
    <img class="icon-img" alt="JavaScript Code" src="assets/send.png">

    <main>
        <section id="contact">
            <h3>Send a Message</h3>
            <!--
            Contact Form Architecture:
            **************************
            This form does NOT use "mailto:" or direct email submission.

            Instead, it uses JavaScript (Fetch API) to send data to a backend API.

            Request Flow:
            *************
            Browser Form
            > JavaScript (Fetch API)
              > Express API Endpoint (/api/contact)
                > Server-Side Validation (security + data integrity)
                  > Processing Logic (email sending via Nodemailer)
                    > JSON response (success / error)
                      > UI feedback displayed to user
            -->

            <!--
            Form Notes:
            ***********
            1) The "required" attribute:
               - Used for client-side validation only
               - Can be temporarily removed when testing backend validation 
                 to verify that the server correctly validates incoming requests
               - In production, both frontend and backend validation should be enabled

            2) The "autocomplete" attribute:
               Improves user experience by enabling browser autofill.
               Link: https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Attributes/autocomplete

            3) div#form-status:
               This element is used by JavaScript to display:
               - success messages
               - error messages
               - loading states
            -->

            <form id="contact-form" class="contact-form">

                <div class="form-group">
                    <label for="name">Name: *</label>
                    <input type="text" id="name" name="name" placeholder="Your Name" autocomplete="name" maxlength="40"
                        required>
                </div>

                <div class="form-group">
                    <label for="email">Email: *</label>
                    <input type="email" id="email" name="email" placeholder="Your Email" autocomplete="email"
                        maxlength="50" required>
                </div>

                <div class="form-group">
                    <label for="subject">Subject:</label>
                    <input type="text" id="subject" name="subject" placeholder="Subject" maxlength="100">
                </div>

                <div class="form-group">
                    <label for="message">Message: *</label>
                    <textarea id="message" name="message" placeholder="Your Message" rows="6" maxlength="1000" required>
                    </textarea>
                </div>

                <button type="submit" class="btn">
                    Send Message
                </button>

                <!-- Form status messages will be displayed here -->
                <div id="form-status" class="form-status"></div>
            </form>
        </section>
    </main>

    <footer>
        <p>
            &copy; <span id="year"></span> <strong>Anmar Jarjees</strong>.
            Technical Instructor / Web Application Developer
        </p>
    </footer>

    <script src="js/script.js"></script>

</body>

</html>
